<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body { margin:0; padding:0; background:#0F1B1E; overflow:hidden; }
  .wrap { display:flex; align-items:center; gap:14px; padding:14px; font-family: 'Space Grotesk', system-ui, sans-serif; }
  img { width:110px; height:110px; object-fit:cover; border-radius:6px; flex-shrink:0; }
  .meta { color:#F2EFE9; flex:1; min-width:0; }
  .meta .t { font-size:15px; font-weight:600; margin:0 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta .a { font-size:12px; color:#8A8578; margin:0 0 10px; }
  audio { width:100%; height:32px; }
  audio::-webkit-media-controls-panel { background-color:#17262A; }
</style>
</head>
<body>
  <div class="wrap">
    <img src="album.jpg" alt="Album art">
    <div class="meta">
      <p class="t">Song Name</p>
      <p class="a">Artist Name</p>
      <audio controls src="song.mp3" preload="metadata"></audio>
    </div>
  </div>
</body>
</html>
