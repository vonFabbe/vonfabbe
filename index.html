<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>den lilla bäcken</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0B0B0F;
    overflow: hidden;
  }
  .stage {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Entry screen */
  .enter-btn {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 999px;
    padding: 16px 36px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease, opacity 0.4s ease;
  }
  .enter-btn:hover { background: rgba(255,255,255,0.08); }
  .enter-btn:active { transform: scale(0.97); }
  .enter-btn.hidden { opacity: 0; pointer-events: none; }

  /* Album art */
  .art {
    max-width: min(90vw, 90vh);
    max-height: min(90vw, 90vh);
    width: 520px;
    height: 520px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 40px 90px -20px rgba(0,0,0,0.7);
    display: block;
    position: absolute;
    opacity: 0;
    transform: scale(0.96);
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none;
  }
  .art.visible {
    opacity: 1;
    transform: scale(1);
  }
</style>
</head>
<body>
  <div class="stage">
    <button class="enter-btn" id="enterBtn">click to enter!</button>
    <img class="art" id="art" src="album.jpg" alt="Album art">
  </div>

  <audio id="audio" src="song.mp3" preload="auto" loop></audio>

  <script>
    const audio = document.getElementById('audio');
    const enterBtn = document.getElementById('enterBtn');
    const art = document.getElementById('art');

    enterBtn.addEventListener('click', () => {
      enterBtn.classList.add('hidden');
      art.classList.add('visible');
      audio.play().catch(err => console.error('Playback failed:', err));
    });
  </script>
</body>
</html>
